<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="rps.css">

</head>

<body>

    <div class="container">
        <h1>Rock - Paper - Scissors</h1>
       
        <div class="text">
            <p id="textone">Make your move!</p>
        </div>

        
        <!-- SCOREBOARD -->
        <div class="scoreboard">
            <div class="score-box">
                <span>Wins</span>
                <p id="wins">0</p>
            </div>

            <div class="score-box">
                <span>Losses</span>
                <p id="losses">0</p>
            </div>

            <div class="score-box">
                <span>Ties</span>
                <p id="ties">0</p>
            </div>
        </div>

        <div class="choices">
            <div class="btnrock">
                <button onclick="Game('rock')">🪨</button>
            </div>

            <div class="btnpaper">
                <button onclick="Game('paper')">📄</button>
            </div>

            <div class="btnscissors">
                <button onclick="Game('scissors')">✂️</button>
            </div>
        </div>

        <div id="player-choice"> PLAYER: </div>
        <div id="computer-choice"> COMPUTER:</div>
        <div id="resultDisplay">RESULT</div>
  
        
        <!-- RESET BUTTON -->
        <button id="resetBtn" onclick="resetScore()">Reset Score</button>
        
    </div>

    <script src="rsp.js"></script>

</body>
</html>
